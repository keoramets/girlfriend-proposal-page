<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Little Question 💖</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="floating-hearts" id="floatingHearts"></div>

    <main class="card">
      <div class="emoji-face" aria-hidden="true">🥹👉</div>

      <p class="tiny-text">I have one tiny question...</p>

      <h1 class="reveal-text" id="question">
        <span>Thandoe Wangu! </span>
        <span>Will</span>
        <span>you</span>
        <span>be</span>
        <span>my</span>
        <span>girlfriend?</span>
      </h1>

      <p class="subtext">
        Choose wisely... one button is clearly more emotionally mature.
      </p>

      <div class="button-area" id="buttonArea">
        <button class="yes-btn" id="yesBtn">Yes 💕</button>
        <button class="no-btn" id="noBtn">No 😭</button>
      </div>

      <p class="hint">The red button is nervous. The pink button is waiting.</p>
    </main>

    <div class="celebration" id="celebration">
      <div class="celebration-box">
        <h2>YAAAY! 💖</h2>
        <p>Now send the message so I can officially celebrate.</p>
        <button id="whatsappBtn">Send me the good news 💌</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
